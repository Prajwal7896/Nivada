<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - Smart AI Complaint Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-effect p-8 rounded-2xl shadow-xl border border-slate-200">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-full mb-4 shadow-lg shadow-blue-200">
                <i class="fas fa-user-shield text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Admin Registration</h1>
            <p class="text-slate-500 text-sm mt-2">Join the Smart AI Complaint Management Team</p>
        </div>

        {% if error %}
        <div class="mb-4 p-3 bg-red-100 text-red-700 rounded-lg text-sm">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="mb-4 p-3 bg-green-100 text-green-700 rounded-lg text-sm">
            {{ success }}
        </div>
        {% endif %}

        <form action="/admin/register" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Full Name</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" name="username" required
                        class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-slate-800 placeholder-slate-400"
                        placeholder="John Doe">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required
                        class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-slate-800 placeholder-slate-400"
                        placeholder="admin@smartcity.gov">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Department</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-building"></i>
                    </span>
                    <select name="department" required
                        class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-slate-800 bg-white appearance-none">
                        <option value="" disabled selected>Select Department</option>
                        <option value="police">Police</option>
                        <option value="electricity">Electricity</option>
                        <option value="water">Water</option>
                        <option value="transport">Transport</option>
                        <option value="health">Health</option>
                        <option value="municipal">Municipal</option>
                        <option value="environment">Environment</option>
                        <option value="telecom">Telecom</option>
                        <option value="education">Education</option>
                        <option value="consumer">Consumer Affairs</option>
                    </select>
                    <span class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </span>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" required minlength="6"
                        class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-slate-800"
                        placeholder="••••••••">
                </div>
                <p class="text-[10px] text-slate-500 mt-1">Minimum 6-8 characters recommended.</p>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Confirm Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-check-double"></i>
                    </span>
                    <input type="password" name="confirm_password" required minlength="6"
                        class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all outline-none text-slate-800"
                        placeholder="••••••••">
                </div>
            </div>

            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-blue-100 transition-all transform hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2">
                <i class="fas fa-user-plus"></i>
                Complete Registration
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-sm text-slate-600">
                Already registered? 
                <a href="/admin/login" class="text-blue-600 font-bold hover:underline">Login here</a>
            </p>
        </div>
    </div>

    <script>
        const form = document.querySelector('form');
        const pass = document.querySelector('input[name="password"]');
        const confirm = document.querySelector('input[name="confirm_password"]');

        form.addEventListener('submit', (e) => {
            if (pass.value !== confirm.value) {
                e.preventDefault();
                alert("Passwords do not match!");
            }
        });
    </script>
</body>
</html>
