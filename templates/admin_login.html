<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Smart AI Complaint Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass-effect p-8 rounded-2xl shadow-xl border border-slate-200">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-indigo-600 rounded-full mb-4 shadow-lg shadow-indigo-200">
                <i class="fas fa-lock text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Admin Portal</h1>
            <p class="text-slate-500 text-sm mt-2">Sign in to manage departmental complaints</p>
        </div>

        

        <form action="/admin/login" method="POST" class="space-y-5">
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Your Department</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-sitemap"></i>
                    </span>
                    <select name="department" required
                        class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none text-slate-800 bg-white appearance-none">
                        <option value="" disabled selected>Select Department</option>
                        <option value="police">Police</option>
                        <option value="electricity">Electricity</option>
                        <option value="water">Water</option>
                        <option value="transport">Transport</option>
                        <option value="health">Health</option>
                        <option value="municipal">Municipal</option>
                        <option value="environment">Environment</option>
                        <option value="telecom">Telecom</option>
                        <option value="education">Education</option>
                        <option value="consumer">Consumer Affairs</option>
                    </select>
                    <span class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none text-slate-400">
                        <i class="fas fa-chevron-down text-xs"></i>
                    </span>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-1">Email Address</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required
                        class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none text-slate-800 placeholder-slate-400"
                        placeholder="admin@smartcity.gov">
                </div>
            </div>

            <div>
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-semibold text-slate-700">Password</label>
                    <a href="#" class="text-xs text-indigo-600 hover:underline">Forgot password?</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-key"></i>
                    </span>
                    <input type="password" name="password" required
                        class="block w-full pl-10 pr-3 py-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all outline-none text-slate-800"
                        placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center">
                <input type="checkbox" id="remember" class="w-4 h-4 text-indigo-600 border-slate-300 rounded focus:ring-indigo-500">
                <label for="remember" class="ml-2 text-sm text-slate-600">Remember this device</label>
            </div>

            <button type="submit"
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow-lg shadow-indigo-100 transition-all transform hover:-translate-y-0.5 active:scale-95 flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i>
                Secure Login
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-100 text-center">
            <p class="text-sm text-slate-600">
                New department head? 
                <a href="/admin/register" class="text-indigo-600 font-bold hover:underline">Register Admin</a>
            </p>
        </div>
    </div>
</body>
</html>
